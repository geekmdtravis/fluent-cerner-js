name: NPM Publish

on:
  release:
    types: [published]

jobs:
  test:
    name: Test on Node ${{ matrix.node }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      HUSKY: 0
    strategy:
      matrix:
        node: ['22.x', '24.x']
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install deps
        uses: bahmutov/npm-install@v1

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test --ci --coverage --maxWorkers=2

      - name: Build
        run: npm run build

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    environment: fluent-cerner-js
    env:
      HUSKY: 0

    permissions:
      contents: read
      id-token: write # CRITICAL: Required for OIDC / Trusted Publishing

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install deps
        uses: bahmutov/npm-install@v1

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
