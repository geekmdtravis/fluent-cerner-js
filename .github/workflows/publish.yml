name: NPM Publish
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    environment: npmjs  
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test
      - name: Publish
        run: npm publish --provenance --access public
