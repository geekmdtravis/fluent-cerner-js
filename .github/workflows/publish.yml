name: NPM Publish
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    environment: fluent-cerner-js
    env:
      HUSKY: 0
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Publish
        run: npm publish --provenance --access public
